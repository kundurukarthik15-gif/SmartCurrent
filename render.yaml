services:
  # Unified Web Service (FastAPI Backend + React Frontend served on the same port)
  - type: web
    name: smart-current-bill-predictor
    env: python
    buildCommand: python build_render.py
    startCommand: PYTHONPATH=backend uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./backend/smart_bill.db
      - key: SECRET_KEY
        generateValue: true
      - key: QR_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@smartbill.com
      - key: ADMIN_PASSWORD
        value: AdminPass123!
