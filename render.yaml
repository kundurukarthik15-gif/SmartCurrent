services:
  # Backend Web Service
  - type: web
    name: smart-current-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt && python setup_project.py
    startCommand: PYTHONPATH=backend uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./backend/smart_bill.db
      - key: SECRET_KEY
        generateValue: true
      - key: QR_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@smartbill.com
      - key: ADMIN_PASSWORD
        value: AdminPass123!

  # Frontend Static Site
  - type: web
    name: smart-current-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    publishDir: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: smart-current-backend
          type: web
          property: url
